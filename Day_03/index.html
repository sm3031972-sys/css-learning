<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS selector</title>
    <style>
        div{
            /* background-color: red; */
        }

        /* Class selector */
        .red{
            background-color: red;
        }

        /* ID selector */
        #green{
            background-color: green;
        }

        /* Universal Selector */
        *{
            margin: 0;
            padding: 0;
        }

        /* pseudo selectors */
        a:visited{
            color: yellow;
        }
        a:active{
            background-color: rgb(183, 23, 23);
        }
    </style>
</head>
<body>
    <div class="red">
        I am a div
    </div>

    <div id="green">
        I am another div
    </div>
    <p class="red">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Ea perferendis expedita nihil cum officia veniam, tenetur reprehenderit amet at voluptatibus officiis dicta porro?
    </p>

    <a href="https://www.google.com">Go to google</a>
</body>
</html>
