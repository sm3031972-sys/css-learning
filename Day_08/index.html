<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Display proporty</title>
    <style>
        div{
            display: inline-block;
            border: 2px solid yellow;
            padding: 45px;
            margin: 20px;
        }
        .box{
            border: 2px solid blue;
            display: inline;
        }
        span{
            border: 2px solid red;
            
        }
    </style>
</head>
<body>
    <div class="box">
        i am a box
    </div>
    <div>
        i am another box
    </div>
    <span>
        i am a span
    </span>
</body>
</html>
