<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shadow</title>
    <style>
        .box{
            border: 2px solid blue;
            padding: 34px;
            box-shadow: 5px 15px 5px red;
            text-shadow: 2px 2px 2px red;
            outline: 3px solid red;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="box">
        Lorem ipsum dolor sit, amet consectetur adipisicing elit. Rem culpa laudantium quia eum ducimus explicabo voluptatibus repudiandae quis non? Rerum odio eligendi molestias!
    </div>
</body>
</html>
